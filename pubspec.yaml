name: alimentaperu_app
description: "Proyecto Alimenta Perú - Villa El Salvador"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  flutter_native_splash: ^2.4.7
  google_generative_ai: ^0.4.7
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#1A4D2E"
  android: true
  ios: true
  android_12:
    color: "#1A4D2E"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/alimenta_peru_icon.png"
  adaptive_icon_background: "#1A4D2E"
  adaptive_icon_foreground: "assets/images/alimenta_peru_icon.png"